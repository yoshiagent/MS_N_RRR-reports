name: Deploy static HTML to Pages

# 用第三方 peaceiris/actions-gh-pages 取代官方 actions/configure-pages
# （codeload 對該帳號 Pages-related actions 拿不到，但 third-party action 可正常下載）

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write    # peaceiris needs to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.py,*.md,*.json'
          keep_files: false
          enable_jekyll: false
