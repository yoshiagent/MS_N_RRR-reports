<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配對自選股 即時日K</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  html { overflow-x: hidden; }
  body {
    width:100vw; max-width:100vw; overflow-x:hidden; margin:0; padding:0;
    background:#0d1117; color:#e2e8f0;
    font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    line-height:1.7;
  }
  #topbar { padding:10px 14px 0 14px; }
  h1 { font-size:1.05rem; margin:0 0 6px 0; font-weight:700; }
  #status { font-size:.8rem; color:#94a3b8; }
  #status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .dot.live { background:#4ade80; box-shadow:0 0 6px #4ade80; }
  .dot.stale { background:#64748b; }
  #chips { display:flex; flex-wrap:wrap; gap:6px; padding:8px 14px; }
  .pairgroup { display:flex; gap:4px; align-items:center; background:#131f2e; border:1px solid #2d3f55; border-radius:8px; padding:4px 6px; }
  .pairgroup .glabel { font-size:.68rem; color:#94a3b8; padding:0 3px; }
  .chip {
    border:1px solid #334155; background:#1e293b; color:#e2e8f0;
    border-radius:6px; padding:3px 8px; font-size:.8rem; cursor:pointer; white-space:nowrap;
  }
  .chip.active { border-color:#3b82f6; background:#0f2040; color:#93c5fd; }
  .chip .pct { font-size:.7rem; margin-left:4px; }
  .up { color:#f87171; }   /* 台股慣例:紅漲 */
  .down { color:#4ade80; } /* 綠跌 */
  .flat { color:#94a3b8; }
  #stats {
    display:flex; flex-wrap:wrap; gap:4px 18px; padding:6px 14px; font-size:.86rem;
    background:#131f2e; border-top:1px solid #2d3f55; border-bottom:1px solid #2d3f55;
  }
  #stats b { font-size:1.05rem; }
  #stats .lbl { color:#94a3b8; font-size:.75rem; margin-right:4px; }
  #rangebtns { padding:6px 14px; display:flex; gap:6px; align-items:center; }
  .rbtn { border:1px solid #334155; background:#1e293b; color:#94a3b8; border-radius:6px; padding:2px 10px; font-size:.78rem; cursor:pointer; }
  .rbtn.active { border-color:#3b82f6; color:#93c5fd; background:#0f2040; }
  #chart { display:block; width:100vw !important; max-width:100vw; margin:0; overflow:hidden; }
  footer { padding:10px 14px 20px 14px; font-size:.72rem; color:#94a3b8; }
</style>
</head>
<body>
<div id="topbar">
  <h1>配對自選股 即時日K <span style="font-size:.7rem;color:#fb923c;">prototype</span></h1>
  <div style="font-size:.75rem;margin-bottom:2px;">
    <a href="rt_home.html" style="color:#93c5fd;text-decoration:none;">🏠 入口</a>
    <span style="color:#334155;"> | </span>
    <a href="pair_mainforce_live.html" style="color:#93c5fd;text-decoration:none;">🔍 主力動向</a>
  </div>
  <div id="status"><span class="dot stale"></span><span id="statustext">載入中…</span></div>
</div>
<div id="chips"></div>
<div id="stats"></div>
<div id="rangebtns">
  <span class="lbl" style="color:#94a3b8;font-size:.75rem;">顯示範圍</span>
  <button class="rbtn" data-n="60">近3月</button>
  <button class="rbtn" data-n="120">近6月</button>
  <button class="rbtn" data-n="0">全部</button>
</div>
<div id="chart"></div>
<footer>
  資料來源:XQ 全球贏家 RTD(盤中即時,約 5 秒更新)+ FinMind 還原價(歷史日K,stockHisData 股價庫)。
  最後一根 K 棒為今日盤中即時值,收盤後即為當日完整日K。單位:量=張。
</footer>
<script>
"use strict";
const UP = "#f87171", DOWN = "#4ade80";      // 台股紅漲綠跌
const MA5C = "#60a5fa", MA20C = "#fb923c";
const POLL_MS = 5000, STALE_MS = 30000;

let HIST = null, QUOTES = null;
let sym = "8046", rangeN = 60;

const $ = s => document.querySelector(s);

function pctClass(v){ return v > 0 ? "up" : v < 0 ? "down" : "flat"; }
function fmt(v, d=2){ return v == null ? "–" : Number(v).toFixed(d).replace(/\.?0+$/, m => m.includes(".") ? "" : m); }

/* ---------- 合併歷史 + 今日即時 ---------- */
function mergedSeries(s){
  const h = HIST.history[s];
  const out = { dates:h.dates.slice(), o:h.o.slice(), h:h.h.slice(), l:h.l.slice(), c:h.c.slice(), v:h.v.slice() };
  const q = QUOTES && QUOTES.stocks[s];
  // 盤前/假日凍結值、以及開盤初期尚未成交的個股(fresh=false),不併入今日K
  const liveOk = QUOTES && (!QUOTES.session || QUOTES.session === "live");
  if (liveOk && q && q.fresh !== false && q.price != null && q.open != null){
    const live = { d:QUOTES.market_date, o:q.open, h:q.high, l:q.low, c:q.price, v:q.total_volume };
    const lastIdx = out.dates.length - 1;
    if (out.dates[lastIdx] === live.d){          // 歷史庫已含今日 → 以 RTD 蓋掉
      out.o[lastIdx]=live.o; out.h[lastIdx]=live.h; out.l[lastIdx]=live.l; out.c[lastIdx]=live.c; out.v[lastIdx]=live.v;
    } else if (live.d > out.dates[lastIdx]){     // 今日尚未入庫 → 追加
      out.dates.push(live.d); out.o.push(live.o); out.h.push(live.h); out.l.push(live.l); out.c.push(live.c); out.v.push(live.v);
    }
  }
  return out;
}
function ma(arr, n){
  const out = new Array(arr.length).fill(null);
  let sum = 0;
  for (let i=0;i<arr.length;i++){
    sum += arr[i];
    if (i >= n) sum -= arr[i-n];
    if (i >= n-1) out[i] = sum / n;
  }
  return out;
}

/* ---------- 繪圖 ---------- */
function draw(){
  if (!HIST) return;
  const m = mergedSeries(sym);
  const n = m.dates.length;
  const start = rangeN > 0 ? Math.max(0, n - rangeN) : 0;
  const ma5 = ma(m.c, 5), ma20 = ma(m.c, 20);

  const yLo = Math.min(...m.l.slice(start)), yHi = Math.max(...m.h.slice(start));
  const pad = (yHi - yLo) * 0.04;
  const vHi = Math.max(...m.v.slice(start));
  const volColors = m.c.map((c,i) => c >= m.o[i] ? UP : DOWN);

  const name = (HIST.pairs.flatMap(p=>p.stocks).find(x=>x.symbol===sym)||{}).name || sym;

  const traces = [
    { type:"candlestick", x:m.dates, open:m.o, high:m.h, low:m.l, close:m.c,
      increasing:{line:{color:UP, width:1}, fillcolor:UP},
      decreasing:{line:{color:DOWN, width:1}, fillcolor:DOWN},
      name:"日K", yaxis:"y", showlegend:false, line:{width:1},
      hoverlabel:{bgcolor:"#1e293b", bordercolor:"#334155", font:{color:"#e2e8f0", size:12}} },
    { type:"scatter", mode:"lines", x:m.dates, y:ma5, name:"MA5",
      line:{color:MA5C, width:1.4}, hoverinfo:"skip" },
    { type:"scatter", mode:"lines", x:m.dates, y:ma20, name:"MA20",
      line:{color:MA20C, width:1.4}, hoverinfo:"skip" },
    { type:"bar", x:m.dates, y:m.v, name:"量(張)", yaxis:"y2",
      marker:{color:volColors, opacity:.55}, showlegend:false,
      hovertemplate:"%{x}<br>量 %{y:,.0f} 張<extra></extra>",
      hoverlabel:{bgcolor:"#1e293b", bordercolor:"#334155", font:{color:"#e2e8f0", size:12}} },
  ];
  const h = Math.max(Math.min(window.innerHeight - 230, 760), 420);
  const layout = {
    height:h, autosize:true,
    paper_bgcolor:"#0d1117", plot_bgcolor:"#111827",
    font:{color:"#94a3b8", size:11},
    margin:{l:8, r:52, t:10, b:28},
    dragmode:false, hovermode:"x",
    legend:{orientation:"h", x:1, xanchor:"right", y:1.03, font:{color:"#94a3b8"}},
    xaxis:{ type:"category", range:[start-0.5, n-0.5], rangeslider:{visible:false},
      gridcolor:"#1f2937", tickmode:"auto", nticks:8, fixedrange:true },
    yaxis:{ domain:[0.24, 1], range:[yLo-pad, yHi+pad], side:"right",
      gridcolor:"#1f2937", fixedrange:true, tickformat:",.0f" },
    yaxis2:{ domain:[0, 0.2], range:[0, vHi*1.1], side:"right",
      gridcolor:"#1f2937", fixedrange:true, tickformat:"~s" },
    title:{ text:`${name} ${sym}`, font:{color:"#e2e8f0", size:13}, x:0.02, y:0.98 },
  };
  Plotly.react("chart", traces, layout,
    {displayModeBar:false, scrollZoom:false, doubleClick:false, responsive:true});
}

/* ---------- 上方資訊 ---------- */
function renderChips(){
  const el = $("#chips");
  el.innerHTML = "";
  for (const p of HIST.pairs){
    const g = document.createElement("div");
    g.className = "pairgroup";
    g.innerHTML = `<span class="glabel">${p.group}</span>`;
    for (const st of p.stocks){
      const q = QUOTES && QUOTES.stocks[st.symbol];
      const pct = q ? q.change_pct : null;
      const b = document.createElement("button");
      b.className = "chip" + (st.symbol === sym ? " active" : "");
      b.innerHTML = `${st.name}<span class="pct ${pct==null?"flat":pctClass(pct)}">${pct==null?"":(pct>0?"+":"")+fmt(pct)}%</span>`;
      b.onclick = () => { sym = st.symbol; renderChips(); renderStats(); draw(); };
      g.appendChild(b);
    }
    el.appendChild(g);
  }
}
function renderStats(){
  const q = QUOTES && QUOTES.stocks[sym];
  const el = $("#stats");
  if (!q){ el.innerHTML = `<span class="lbl">尚無即時資料(盤中且 poller 執行時才有)</span>`; return; }
  const cls = pctClass(q.change);
  el.innerHTML = `
    <span><b class="${cls}">${fmt(q.price)}</b></span>
    <span class="${cls}">${q.change>0?"▲":q.change<0?"▼":""} ${fmt(Math.abs(q.change))} (${q.change>0?"+":q.change<0?"-":""}${fmt(Math.abs(q.change_pct))}%)</span>
    <span><span class="lbl">開</span>${fmt(q.open)}</span>
    <span><span class="lbl">高</span>${fmt(q.high)}</span>
    <span><span class="lbl">低</span>${fmt(q.low)}</span>
    <span><span class="lbl">昨收</span>${fmt(q.prev_close)}</span>
    <span><span class="lbl">總量</span>${q.total_volume==null?"–":Number(q.total_volume).toLocaleString()} 張</span>
    <span><span class="lbl">量比</span>${fmt(q.vol_ratio)}</span>
    <span><span class="lbl">時間</span>${q.time}</span>`;
}
function renderStatus(){
  const dot = $("#status .dot"), txt = $("#statustext");
  if (!QUOTES){ dot.className = "dot stale"; txt.textContent = "無即時資料"; return; }
  const age = Date.now() - new Date(QUOTES.updated.replace(" ", "T")).getTime();
  const t = QUOTES.stocks[sym] ? QUOTES.stocks[sym].time : "";
  if (QUOTES.session === "prev_day"){
    dot.className = "dot stale";
    txt.textContent = `盤前/非本日資料 · 下方數值為前一交易日 · 快照 ${QUOTES.updated}`;
  } else if (QUOTES.session === "closed"){
    dot.className = "dot stale";
    txt.textContent = `非交易日 · 快照 ${QUOTES.updated}`;
  } else if (age < STALE_MS){
    dot.className = "dot live";
    txt.textContent = `即時更新中 · 快照 ${QUOTES.updated}`;
  } else {
    dot.className = "dot stale";
    const closed = t >= "13:30:00";
    txt.textContent = (closed ? "已收盤 · " : "資料靜止 · ") + `最後快照 ${QUOTES.updated}`;
  }
}

/* ---------- 資料載入 ---------- */
async function loadQuotes(){
  try {
    const r = await fetch(`rt_quotes.json?t=${Date.now()}`, {cache:"no-store"});
    if (r.ok) QUOTES = await r.json();
  } catch(e){ /* 離線或檔案不存在:保持上次狀態 */ }
  renderChips(); renderStats(); renderStatus();
  if (HIST) draw();
}
async function init(){
  const r = await fetch(`rt_history.json?t=${Date.now()}`, {cache:"no-store"});
  HIST = await r.json();
  document.querySelectorAll(".rbtn").forEach(b => {
    if (+b.dataset.n === rangeN) b.classList.add("active");
    b.onclick = () => {
      rangeN = +b.dataset.n;
      document.querySelectorAll(".rbtn").forEach(x=>x.classList.toggle("active", x===b));
      draw();
    };
  });
  await loadQuotes();
  setInterval(loadQuotes, POLL_MS);
  window.addEventListener("resize", () => draw());
}
init();
</script>
</body>
</html>
